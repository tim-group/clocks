name: "Gradle Build"
on:
  push:
    paths-ignore:
      - '**/README.md'
      - 'docs/**'

jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 8
          distribution: zulu

      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: zulu

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build
